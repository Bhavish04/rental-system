version: "3.9"

# ── RentSmart Full Stack ──────────────────────────────────────────
# Usage:
#   cp .env.example .env      # fill your API keys
#   docker compose up --build
# Frontend  → http://localhost:3000
# API docs  → http://localhost:8000/docs
# ─────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rentsmart_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rentsmart
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rentsmart123}
      POSTGRES_DB: rentsmart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seeds.sql:/docker-entrypoint-initdb.d/02_seeds.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentsmart"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rentsmart_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  # ── FastAPI Backend ───────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rentsmart_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://rentsmart:${DB_PASSWORD:-rentsmart123}@postgres:5432/rentsmart
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ─────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rentsmart_celery
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://rentsmart:${DB_PASSWORD:-rentsmart123}@postgres:5432/rentsmart
      REDIS_URL: redis://redis:6379/0
    depends_on: [redis, postgres]
    volumes:
      - ./backend:/app
    command: celery -A app.celery_app worker --loglevel=info

  # ── React Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rentsmart_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
